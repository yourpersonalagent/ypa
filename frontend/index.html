<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in · YPA</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  a.signin {
    display: inline-block;
    padding: 14px 36px;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 999px;
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    background: transparent;
    transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
  }
  a.signin:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.7);
  }
  a.signin:active { transform: scale(0.98); }
  a.signin:focus-visible {
    outline: 2px solid #fff;
    outline-offset: 3px;
  }
</style>
</head>
<body>
  <a class="signin" href="/auth/login">Sign in</a>
</body>
</html>
